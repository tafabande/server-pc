apiVersion: 1

datasources:
  - name: Prometheus
    type: prometheus
    access: proxy
    url: http://prometheus:9090
    isDefault: true
    editable: false

  - name: PostgreSQL
    type: postgres
    access: proxy
    url: postgres:5432
    user: streamdrop
    secureJsonData:
      password: streamdrop
    jsonData:
      database: streamdrop
      sslmode: disable
      postgresVersion: 1600
      timescaledb: false
    editable: false
