<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>StreamDrop Media</title>
    
    <!-- Material Design & Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" rel="stylesheet">
    
    <link rel="stylesheet" href="/static/css/m3.css">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>💧</text></svg>">
    
    <link rel="manifest" href="/manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#121212">

    <script>
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('/sw.js');
        }
    </script>
</head>
<body>

    <div class="app-container">
        <header>
            <div class="header-top">
                <div class="search-bar">
                    <span class="material-symbols-rounded">search</span>
                    <input type="text" id="searchInput" placeholder="Search files..." autocomplete="off">
                    <span class="material-symbols-rounded" id="clearSearch" style="cursor: pointer; display: none;">close</span>
                </div>

                <div class="header-actions">
                    <button class="icon-btn action-btn" id="streamToggleBtn" title="Toggle Stream Source">
                        <span class="material-symbols-rounded">screen_share</span>
                    </button>
                    <button class="icon-btn action-btn danger" id="shutdownBtn" title="Force Kill Server">
                        <span class="material-symbols-rounded">power_settings_new</span>
                    </button>
                </div>
            </div>

            <div class="filters">
                <div class="chip active" data-filter="all">
                    <span class="material-symbols-rounded">grid_view</span>
                    All
                </div>
                <div class="chip" data-filter="favorites">
                    <span class="material-symbols-rounded">star</span>
                    Favorites
                </div>
            </div>

            <nav class="breadcrumbs" id="breadcrumbs">
                <!-- Dynamic breadcrumbs -->
            </nav>
        </header>

        <main class="gallery" id="gallery">
            <!-- Dynamic gallery items -->
        </main>

        <div id="emptyState" class="empty-state" style="display: none;">
            <span class="material-symbols-rounded">folder_open</span>
            <p>No files found</p>
        </div>
    </div>

    <!-- Hidden Upload Input -->
    <input type="file" id="fileInput" multiple style="display: none;">
    
    <!-- FAB for Upload -->
    <div class="fab" id="uploadFab" title="Upload Files">
        <span class="material-symbols-rounded">add</span>
    </div>

    <!-- Custom Video Player Overlay -->
    <div id="player-container" class="hidden">
        <video id="main-video" playsinline></video>
        
        <div id="player-ui">
            <div class="player-top">
                <div class="top-left">
                    <button class="icon-btn" id="closePlayerBtn">
                        <span class="material-symbols-rounded">arrow_back</span>
                    </button>
                    <h2 id="player-title">Video Title</h2>
                </div>
                
                <div class="top-right">
                    <button class="icon-btn" id="fav-btn">
                        <span class="material-symbols-rounded" id="fav-icon">favorite_border</span>
                    </button>
                    <button class="icon-btn" id="downloadCurrentBtn">
                        <span class="material-symbols-rounded">download</span>
                    </button>
                </div>
            </div>

            <div class="player-center" id="speed-indicator">
                <span class="material-symbols-rounded">fast_forward</span>
                <span>2x Speed</span>
            </div>

            <div class="player-bottom">
                <div class="progress-container">
                    <input type="range" id="seek-bar" min="0" max="100" value="0" step="0.1">
                </div>
                
                <div class="control-row">
                    <div class="control-left">
                        <button class="icon-btn" id="prevBtn">
                            <span class="material-symbols-rounded">skip_previous</span>
                        </button>
                        <button class="icon-btn" id="play-pause-btn">
                            <span class="material-symbols-rounded" id="play-icon">play_arrow</span>
                        </button>
                        <button class="icon-btn" id="nextBtn">
                            <span class="material-symbols-rounded">skip_next</span>
                        </button>
                        <span id="time-display">0:00 / 0:00</span>
                    </div>
                    
                    <div class="control-right">
                        <button class="icon-btn" id="fullscreenBtn">
                            <span class="material-symbols-rounded">fullscreen</span>
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="/static/js/app.js"></script>
</body>
</html>
