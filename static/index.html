<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>StreamDrop Media</title>
    
    <!-- Material Design & Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    
    <!-- Quill.js for Document Editing -->
    <link href="https://cdn.quilljs.com/1.3.7/quill.snow.css" rel="preload" as="style" onload="this.onload=null;this.rel='stylesheet'">
    <noscript><link href="https://cdn.quilljs.com/1.3.7/quill.snow.css" rel="stylesheet"></noscript>
    
    <link rel="stylesheet" href="/static/css/m3.css?v=8">
    <script src="/static/js/offline-icons.js?v=8"></script>
    <meta name="description" content="StreamDrop — LAN Media Hub for streaming, sharing, and managing media files on your local network.">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>💧</text></svg>">
    
    <link rel="manifest" href="/manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="StreamDrop">
    <meta name="theme-color" content="#121212">
    
    <link rel="apple-touch-icon" href="/static/img/icon-192.png">

    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('/sw.js').then(reg => {
                    console.log('SW registered:', reg);
                }).catch(err => {
                    console.error('SW failed:', err);
                });
            });
        }
    </script>
</head>
<body>

    <div class="app-container">
        <!-- Global Progress Tracker -->
        <div id="globalProgress" class="global-progress-container hidden">
            <div class="progress-info">
                <span id="progressLabel">Uploading...</span>
                <span id="progressPercent">0%</span>
            </div>
            <div class="progress-track">
                <div id="progressBar" class="progress-fill"></div>
            </div>
        </div>

        <header>
            <div class="header-top">
                <div class="search-bar">
                    <span class="material-symbols-rounded">search</span>
                    <input type="text" id="searchInput" placeholder="Search files..." autocomplete="off">
                    <span class="material-symbols-rounded" id="clearSearch" style="cursor: pointer; display: none;">close</span>
                </div>

                <div class="header-actions">
                    <button class="icon-btn action-btn" id="qrCodeBtn" title="Show QR Code">
                        <span class="material-symbols-rounded">qr_code_2</span>
                    </button>
                    <button class="icon-btn action-btn" id="installAppBtn" title="Install App" style="display: none;">
                        <span class="material-symbols-rounded">download_for_offline</span>
                    </button>
                    <button class="icon-btn action-btn" id="streamToggleBtn" title="Toggle Stream Source">
                        <span class="material-symbols-rounded">screen_share</span>
                    </button>
                    <button class="icon-btn action-btn danger" id="shutdownBtn" title="Force Kill Server">
                        <span class="material-symbols-rounded">power_settings_new</span>
                    </button>
                </div>
            </div>

            <div class="filters" style="display: flex; align-items: center; justify-content: space-between;">
                <div style="display: flex; gap: 8px;">
                    <div class="chip active" data-filter="all">
                        <span class="material-symbols-rounded">grid_view</span>
                        All
                    </div>
                    <div class="chip" data-filter="favorites">
                        <span class="material-symbols-rounded">star</span>
                        Favorites
                    </div>
                </div>
                <!-- Folder Settings (Optimization) -->
                <div class="folder-settings" id="folderSettings" style="display: none; align-items: center; gap: 8px; margin-right: 16px;">
                    <span class="material-symbols-rounded" style="font-size: 20px; color: var(--on-surface-variant);">settings</span>
                    <label class="switch" style="display: flex; align-items: center; cursor: pointer; font-size: 14px; font-weight: 500; color: var(--on-surface-variant);">
                        <input type="checkbox" id="optimizeFolderToggle" style="margin-right: 8px;">
                        Media Optimized
                    </label>
                </div>
            </div>

            <nav class="breadcrumbs" id="breadcrumbs">
                <!-- Dynamic breadcrumbs -->
            </nav>
        </header>

        <main class="gallery" id="gallery">
            <!-- Dynamic gallery items -->
        </main>

        <div id="emptyState" class="empty-state" style="display: none;">
            <span class="material-symbols-rounded">folder_open</span>
            <p>No files found</p>
        </div>
    </div>

    <!-- Hidden Upload Input -->
    <input type="file" id="fileInput" multiple style="display: none;">
    <input type="file" id="subtitleInput" accept=".srt,.vtt" style="display: none;">
    
    <!-- FAB for Upload -->
    <div class="fab" id="uploadFab" title="Upload Files">
        <span class="material-symbols-rounded" id="uploadIcon">add</span>
        <div id="uploadProgress" class="fab-progress"></div>
    </div>

    <!-- Custom Video Player Overlay -->
    <div id="player-container" class="hidden">
        <video id="main-video" playsinline></video>
        
        <div id="player-ui">
            <div class="player-top-gradient">
                <button class="icon-btn back-btn" id="closePlayerBtn">
                    <span class="material-symbols-rounded">keyboard_arrow_down</span>
                </button>
                <h2 id="player-title">Video Title</h2>
                <div class="top-actions">
                    <button class="icon-btn" id="fav-btn">
                        <span class="material-symbols-rounded" id="fav-icon">favorite_border</span>
                    </button>
                    <button class="icon-btn" id="pipBtn" title="Picture-in-Picture">
                        <span class="material-symbols-rounded">picture_in_picture_alt</span>
                    </button>
                    <button class="icon-btn" id="downloadCurrentBtn">
                        <span class="material-symbols-rounded">download</span>
                    </button>
                </div>
            </div>

            <div class="player-center-overlay" id="play-pause-overlay">
                <span class="material-symbols-rounded huge-icon" id="center-play-icon">play_arrow</span>
            </div>

            <div id="seek-text-indicator">0:00</div>

            <!-- Seek Feedback Overlays -->
            <div class="seek-feedback left" id="seek-feedback-left">
                <div class="feedback-circle">
                    <span class="material-symbols-rounded">replay_10</span>
                </div>
            </div>
            <div class="seek-feedback right" id="seek-feedback-right">
                <div class="feedback-circle">
                    <span class="material-symbols-rounded">forward_10</span>
                </div>
            </div>

            <div class="player-bottom-gradient">
                <div class="timeline-container">
                    <span id="time-current" class="time-text">0:00</span>
                    <input type="range" id="seek-bar" min="0" max="100" value="0" step="0.1">
                    <span id="time-total" class="time-text">0:00</span>
                </div>
                
                <div class="bottom-controls">
                    <button class="icon-btn" id="prevBtn">
                        <span class="material-symbols-rounded">skip_previous</span>
                    </button>
                    <button class="icon-btn" id="nextBtn">
                        <span class="material-symbols-rounded">skip_next</span>
                    </button>
                    <div class="spacer"></div>
                    <button class="icon-btn" id="fullscreenBtn">
                        <span class="material-symbols-rounded">fullscreen</span>
                    </button>
                </div>
            </div>
        </div>
    </div>
    
    <!-- Document Editor Overlay -->
    <div id="editor-container" class="hidden" style="position: fixed; inset: 0; z-index: 50; background: var(--m3-surface); flex-direction: column;">
        <div class="editor-header" style="display: flex; align-items: center; padding: 12px 16px; background: var(--surface-container); border-bottom: 1px solid var(--outline-variant);">
            <button class="icon-btn" id="closeEditorBtn" style="margin-right: 12px;">
                <span class="material-symbols-rounded">arrow_back</span>
            </button>
            <h2 id="editor-title" style="margin: 0; font-size: 18px; font-weight: 500; flex-grow: 1;">Document.txt</h2>
            <button class="action-btn" id="saveEditorBtn" style="background: var(--primary); color: var(--on-primary); border: none; padding: 8px 16px; border-radius: 20px; font-weight: 600; cursor: pointer;">
                Save
            </button>
        </div>
        <div id="quill-editor" style="flex-grow: 1; background: var(--surface); color: var(--on-surface);"></div>
    </div>
    
    <!-- File Context Menu (Bottom Sheet) -->
    <div class="bottom-sheet-overlay" id="sheetOverlay"></div>
    <div class="bottom-sheet" id="contextSheet">
        <div class="sheet-handle"></div>
        <div class="sheet-content">
            <div class="sheet-item" id="renameOption">
                <span class="material-symbols-rounded">edit</span>
                <span>Rename</span>
            </div>
            <div class="sheet-item" id="subtitleOption">
                <span class="material-symbols-rounded">closed_caption</span>
                <span>Upload Subtitles</span>
            </div>
            <div class="sheet-item danger" id="deleteOption">
                <span class="material-symbols-rounded">delete</span>
                <span>Delete</span>
            </div>
        </div>
    </div>

    <!-- Rename Dialog -->
    <div class="dialog-overlay" id="dialogOverlay">
        <div class="dialog">
            <h3 class="dialog-title">Rename</h3>
            <div class="dialog-content">
                <input type="text" id="renameInput" placeholder="New name">
            </div>
            <div class="dialog-actions">
                <button class="text-btn" id="cancelRename">Cancel</button>
                <button class="text-btn" id="confirmRename">Rename</button>
            </div>
        </div>
    </div>

    <!-- QR Modal -->
    <div id="qr-modal" class="hidden" style="position: fixed; inset: 0; background: rgba(0,0,0,0.8); z-index: 500; display: flex; align-items: center; justify-content: center; flex-direction: column;">
        <div style="background: #fff; padding: 24px; border-radius: 16px;">
            <div id="qrcode"></div>
        </div>
        <button class="fab" id="closeQrBtn" style="position: relative; margin-top: 24px;">
            <span class="material-symbols-rounded">close</span>
        </button>
    </div>

    <!-- Live Stream Overlay -->
    <div id="stream-container" class="hidden">
        <div class="stream-wrapper">
            <img id="stream-img" src="" alt="Stream Feed">
            <audio id="stream-audio" autoplay></audio>
            <div id="live-captions" class="captions-overlay"></div>
        </div>
        
        <div class="stream-controls">
            <div class="stream-info">
                <span class="material-symbols-rounded">sensors</span>
                <div class="text">
                    <div class="title">Live Desktop Stream</div>
                    <div class="status" id="streamStatus">Connecting...</div>
                </div>
            </div>
            
            <div class="stream-actions">
                <button class="icon-btn action-btn" id="streamModeBtn" title="Switch Source">
                    <span class="material-symbols-rounded">screen_share</span>
                </button>
                <button class="icon-btn action-btn danger" id="closeStreamBtn" title="Close Stream">
                    <span class="material-symbols-rounded">close</span>
                </button>
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <script src="https://cdn.quilljs.com/1.3.7/quill.min.js" async></script>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest" async></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js" async></script>
    
    <script src="/static/js/app.js?v=7"></script>
    <script src="/static/js/editor.js?v=7"></script>
</body>
</html>
